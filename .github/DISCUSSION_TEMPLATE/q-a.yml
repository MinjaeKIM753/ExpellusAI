title: ""
body:
  - type: markdown
    attributes:
      value: |
        Have a question about ExpellusAI? Ask here and the community or team will help.
  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: Describe what you need help with. Include your ExpellusAI version and Windows version if relevant.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, error messages, or anything that helps explain your situation.
